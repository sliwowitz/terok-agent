kind: tool
label: GitHub CLI
binary: gh

credential_proxy:
  route_prefix: gh
  upstream: https://api.github.com
  auth_header: Authorization
  auth_prefix: "token "
  credential_type: oauth_token
  credential_file: hosts.yml
  phantom_env:
    GH_TOKEN: true
  shared_config_patch:
    file: config.yml
    yaml_set: {http_unix_socket: "/tmp/terok-gh-proxy.sock"}

auth:
  host_dir: _gh-config
  container_mount: /home/dev/.config/gh
  modes: [oauth, api_key]
  command: ["gh", "auth", "login"]
  banner_hint: |-
    You will be guided through GitHub authentication.
    Recommended: choose 'Login with a web browser' or paste a token.
  api_key_hint: "Paste a GitHub personal access token (https://github.com/settings/tokens)"

install:
  # The gh apt source is pre-registered in the L1 prelude alongside NodeSource.
  # Here we only refresh the index and install the package.
  run_as_root: |
    RUN set -eux; \
        apt-get update; \
        apt-get install -y --no-install-recommends gh; \
        rm -rf /var/lib/apt/lists/*

help:
  label: '  \033[36mgh\033[0m         - GitHub CLI'
  section: dev_tool
